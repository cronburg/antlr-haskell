name: CI

on:
  push:
    branches-ignore:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          node-version: 24

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: 'latest'

      - name: Cache stack dependencies
        uses: actions/cache@v4
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'package.yaml') }}
          restore-keys: ${{ runner.os }}-stack-

      - name: Build (warnings as notes)
        run: stack build --ghc-options "-Wall"

      - name: Run tests
        # chisel: missing fixture file (test/KNOWN_FAILURES.md)
        # unit: compile-time quasiquoter naming bug (test/KNOWN_FAILURES.md)
        # lr: pre-existing GLRInc/GLRPartial runtime failures (test/KNOWN_FAILURES.md)
        # swift: pre-existing performance issue — very slow to compile (Issue #41)
        run: |
          stack test \
            antlr-haskell:allstar \
            antlr-haskell:atn \
            antlr-haskell:c \
            antlr-haskell:coreg4 \
            antlr-haskell:g4 \
            antlr-haskell:lexer \
            antlr-haskell:ll \
            antlr-haskell:sexpression \
            antlr-haskell:simple \
            antlr-haskell:template \
            antlr-haskell:unit0
