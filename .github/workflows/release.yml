name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HACKAGE_TOKEN: ${{ secrets.HACKAGE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: 'latest'
          enable-cabal: true

      - name: Cache stack dependencies
        uses: actions/cache@v4
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'package.yaml') }}
          restore-keys: ${{ runner.os }}-stack-

      - name: Run tests
        # chisel excluded: missing test/chisel/Language/Chisel/Examples/GHC.chi fixture
        # unit excluded: compile-time naming bug in PlusBug0.hs quasiquoter (see test/KNOWN_FAILURES.md)
        # lr excluded: GLRInc / GLRPartial are known pre-existing runtime failures
        run: |
          stack test \
            antlr-haskell:allstar \
            antlr-haskell:atn \
            antlr-haskell:c \
            antlr-haskell:coreg4 \
            antlr-haskell:g4 \
            antlr-haskell:lexer \
            antlr-haskell:ll \
            antlr-haskell:sexpression \
            antlr-haskell:simple \
            antlr-haskell:swift \
            antlr-haskell:template \
            antlr-haskell:unit0

      - name: Build sdist
        run: stack sdist --pvp-bounds both

      - name: Find sdist tarball
        id: sdist
        run: |
          TARBALL=$(find .stack-work -name "antlr-haskell-*.tar.gz" | head -1)
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $TARBALL)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.sdist.outputs.path }}#${{ steps.sdist.outputs.name }}" \
            --title "${{ github.ref_name }}" \
            --notes "See [ChangeLog.md](https://github.com/cronburg/antlr-haskell/blob/master/ChangeLog.md) for details."

      - name: Upload to Hackage
        if: ${{ env.HACKAGE_TOKEN != '' }}
        run: cabal upload --publish --token="$HACKAGE_TOKEN" "${{ steps.sdist.outputs.path }}"
